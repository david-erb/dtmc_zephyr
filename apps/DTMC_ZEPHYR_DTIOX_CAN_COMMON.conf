
# =========================
# CAN support (classic CAN)
# =========================

# Enable generic CAN API
CONFIG_CAN=y

# MCP2515 CAN driver
CONFIG_CAN_MCP2515=y

# CAN for MCP2515 needs SPI
CONFIG_SPI=y
CONFIG_SPI_NRFX=y

# MCP2515 needs GPIO for its CS and INT pins
CONFIG_GPIO=y

# MCP2515 does NOT support internal loopback for testing without a transceiver
CONFIG_CAN_LOOPBACK=n

# Classic CAN only; your SN65HVD230 is not CAN-FD
CONFIG_CAN_FD_MODE=n

# Optional statistics & state reporting
CONFIG_STATS=y
CONFIG_CAN_STATS=y

# shell command options for CAN diagnostics
# CONFIG_SHELL=y
# CONFIG_CAN_SHELL=y
# CONFIG_DEVICE_SHELL=y
# CONFIG_STATS_NAMES=y
# CONFIG_STATS_SHELL=y

